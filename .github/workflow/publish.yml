name: Push to Hugging Face

on:
  push:
    branches:
      - main # Triggers the workflow when you push to main

jobs:
  deploy:
    runs-on: ubuntu-latest
    
    # These permissions are required for Trusted Publishers / OIDC to work
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          lfs: true

      # Log in using the Trusted Publisher OIDC token
      - name: Login to Hugging Face
        uses: huggingface/actions-credential-helper@v1

      # Example: Push your model/files using git
      - name: Push to Hugging Face Hub
        run: |
          git config --global user.email "actions@github.com"
          git config --global user.name "GitHub Actions"
          # Replace with your actual Hugging Face repo URL (e.g., username/model-name)
          git remote add hf https://huggingface.co/YOUR_HF_USERNAME/YOUR_HF_REPO_NAME
          git push --force hf main
