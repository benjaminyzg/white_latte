name: Publish to Hugging Face

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  publish:
    runs-on: ubuntu-latest
    
    permissions:
      id-token: write # Required so the runner can ask GitHub for an identity token
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          lfs: true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Exchange OIDC Token and Push
        run: |
          # 1. Ask GitHub's environment for the secure OIDC identity token
          ID_TOKEN=$(curl -sSf \
            -H "Authorization: bearer $ACTIONS_ID_TOKEN_REQUEST_TOKEN" \
            "$ACTIONS_ID_TOKEN_REQUEST_URL&audience=https://huggingface.co" \
            | jq -r '.value')
          
          # 2. Exchange the GitHub OIDC token for a temporary Hugging Face access token
          HF_TOKEN=$(curl -sSfX POST https://huggingface.co/oauth/token \
            -d grant_type=urn:ietf:params:oauth:grant-type:token-exchange \
            -d subject_token_type=urn:ietf:params:oauth:token-type:jwt \
            -d subject_token="$ID_TOKEN" \
            -d resource="benjaminyzg/white_latte" \
            | jq -r '.access_token')
          
          # 3. Mask the token from logs for safety
          echo "::add-mask::$HF_TOKEN"
          
          # 4. Use Git to safely force-push the repository to Hugging Face via the token
          git config --global user.email "actions@github.com"
          git config --global user.name "GitHub Actions"
          git push --force https://benjaminyzg:$HF_TOKEN@huggingface.co/models/benjaminyzg/white_latte main
