name: Publish to Hugging Face

on:
  push:
    branches:
      - main
  workflow_dispatch: # Allows you to manually click "Run workflow" if needed

jobs:
  publish:
    runs-on: ubuntu-latest
    
    permissions:
      id-token: write # CRUCIAL: Required so the job can request an OIDC token
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Hugging Face Hub
        run: |
          pip install --upgrade huggingface_hub jq

      - name: Native Hugging Face OIDC Sync
        run: |
          # 1. Request the token from GitHub's OIDC provider
          ID_TOKEN=$(curl -sSf \
            -H "Authorization: bearer $ACTIONS_ID_TOKEN_REQUEST_TOKEN" \
            "$ACTIONS_ID_TOKEN_REQUEST_URL&audience=https://huggingface.co" \
            | jq -r '.value')
          
          # 2. Export the token explicitly so the HF CLI picks it up as a simulated login
          echo "HF_TOKEN=$ID_TOKEN" >> $GITHUB_ENV

      - name: Push to Hub
        run: |
          # The CLI will read the HF_TOKEN we generated above and complete the handshake
          huggingface-cli upload benjaminy/white_latte . . --repo-type=model
