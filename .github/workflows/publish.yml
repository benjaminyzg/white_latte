name: Publish to Hugging Face

on:
  push:
    branches:
      - main

jobs:
  publish:
    runs-on: ubuntu-latest
    
    permissions:
      id-token: write # Crucial for keyless OIDC authentication
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          lfs: true

      # This is the official Hugging Face action that seamlessly handles the OIDC token exchange
      - name: Push to Hugging Face Hub
        uses: huggingface/actions@main
        with:
          repo-id: benjaminyzg/white_latte
          repo-type: model
