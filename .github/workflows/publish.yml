name: Push to Hugging Face

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    
    permissions:
      contents: read
      id-token: write # Required for OIDC authentication

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          lfs: true

      # This marketplace action handles the OIDC token exchange automatically
      - name: Push to Hugging Face Hub
        uses: nateraw/huggingface-sync-action@v0.0.5
        with:
          github_repo_id: benjaminyzg/white_latte
          # CHANGE THIS if your Hugging Face repo path is different:
          huggingface_repo_id: benjaminyzg/white_latte
          repo_type: model
